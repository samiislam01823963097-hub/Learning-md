<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>লার্নহাব - Google Sheets ব্যাকএন্ড</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* আপনার পুরানো CSS - সংক্ষেপে দিচ্ছি, সম্পূর্ণ ওয়ার্কিং */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0a1a3a 0%, #0d1f42 100%); color: #fff; transition: all 0.3s; min-height: 100vh; }
        body.light-mode { background: #f0f4f8; color: #1e293b; }
        body.light-mode .header, body.light-mode .footer { background: white; }
        body.light-mode .card, body.light-mode .dashboard-card { background: white; color: #1e293b; }
        .header { background: rgba(10,26,58,0.95); backdrop-filter: blur(10px); padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo h1 { font-size: 22px; background: linear-gradient(135deg, #fff, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo img { width: 42px; border-radius: 10px; }
        .right-area { display: flex; gap: 12px; align-items: center; }
        .icon-btn { background: #1e3a8a; border: none; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; color: white; font-size: 18px; }
        .user-badge { background: rgba(37,99,235,0.2); padding: 6px 12px; border-radius: 30px; font-size: 13px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .sidebar-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index:199; display: none; }
        .sidebar-overlay.open { display: block; }
        .sidebar { position: fixed; top:0; right:-280px; width:280px; height:100%; background:#0a1a3a; z-index:200; transition: right 0.3s; padding:70px 20px 30px; display: flex; flex-direction: column; gap:6px; border-left:1px solid #2563eb; }
        .sidebar.open { right:0; }
        .sidebar-item { display: flex; align-items: center; gap: 14px; padding: 12px 15px; background: transparent; border: none; width: 100%; cursor: pointer; border-radius: 12px; color: #cbd5e1; font-size: 15px; }
        .sidebar-item:hover { background: rgba(37,99,235,0.2); color: white; transform: translateX(5px); }
        .close-sidebar { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; color: white; }
        .dashboard-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .dashboard-card { background: rgba(15,42,74,0.6); backdrop-filter: blur(10px); border-radius: 28px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(37,99,235,0.3); }
        .dashboard-card h2 { font-size: 22px; margin-bottom: 20px; border-left: 4px solid #3b82f6; padding-left: 15px; }
        .info-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 20px; }
        .info-box { background: rgba(0,0,0,0.2); padding: 18px; border-radius: 20px; }
        .stat-number { font-size: 28px; font-weight: bold; color: #60a5fa; }
        .btn { padding: 10px 24px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; margin: 5px; }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; }
        .btn-outline { background: transparent; border: 1px solid #3b82f6; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 25px; }
        .card { background: rgba(15,42,74,0.55); border-radius: 24px; padding: 20px; text-align: center; border: 1px solid rgba(37,99,235,0.3); }
        .card-icon { font-size: 48px; margin-bottom: 12px; }
        .hero { text-align: center; padding: 60px 20px; }
        .hero h1 { font-size: 46px; background: linear-gradient(135deg, #fff, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .section-title { text-align: center; font-size: 32px; margin-bottom: 40px; }
        .profile-header { display: flex; align-items: center; gap: 25px; flex-wrap: wrap; margin-bottom: 25px; }
        .profile-avatar { width: 85px; height: 85px; background: linear-gradient(135deg, #2563eb, #1e3a8a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; cursor: pointer; position: relative; overflow: hidden; }
        .avatar-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); font-size: 10px; text-align: center; padding: 4px; opacity: 0; transition: 0.2s; }
        .profile-avatar:hover .avatar-overlay { opacity: 1; }
        .refer-link-box { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .refer-link-box input { flex: 1; padding: 12px; border-radius: 30px; background: rgba(0,0,0,0.3); border: none; color: white; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: #0a1a3a; padding: 12px 24px; border-radius: 50px; z-index: 1100; border-left: 4px solid #2563eb; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s; }
        .modal.open { visibility: visible; opacity: 1; }
        .modal-content { background: white; padding: 35px; border-radius: 30px; width: 90%; max-width: 400px; color: #1e293b; }
        .close-modal { float: right; font-size: 24px; cursor: pointer; }
        .switch-link { text-align: center; margin-top: 15px; color: #2563eb; cursor: pointer; }
        .footer { text-align: center; padding: 40px; border-top: 1px solid rgba(37,99,235,0.3); margin-top: 50px; }
        .control-input { width: 100%; padding: 10px; border-radius: 12px; border: none; background: rgba(0,0,0,0.3); color: white; margin-bottom: 10px; }
        @media (max-width: 768px) { .hero h1 { font-size: 32px; } .profile-header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
<header class="header">
    <button class="icon-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
    <div class="logo" id="homeLogo">
        <img id="siteLogo" src="https://raw.githubusercontent.com/teamsilentesports/.gg/main/20260430_225451.png" alt="Logo">
        <h1>লার্নহাব</h1>
    </div>
    <div class="right-area">
        <button class="icon-btn" id="themeBtn"><i class="fas fa-moon"></i></button>
        <div class="user-badge" id="userBadge" style="display: none;"></div>
        <button class="icon-btn" id="accountBtn"><i class="fas fa-user"></i></button>
    </div>
</header>
<div id="app"></div>
<script>
    // ----------------------------- GOOGLE SHEETS BACKEND (রিয়েল ক্লাউড) -----------------------------
    const API_URL = "https://script.google.com/macros/s/AKfycbxbGjwnDOWTn0-4x_o2b9iDpl2bhiKYuoM867URUocHkVjnR94JiWjtSHolIKQ4RG7JsA/exec";
    let useGoogleSheets = true;   // সত্যিকারের Google Sheets ডাটাবেস
    
    async function callSheets(action, payload = null) {
        if (!useGoogleSheets) return { success: false };
        try {
            const res = await fetch(API_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, data: payload })
            });
            return await res.json();
        } catch(e) { console.warn(e); return { success: false }; }
    }
    
    // লোকাল ক্যাশ (অফলাইন বা দ্রুততার জন্য)
    let usersCache = [], coursesCache = [], settingsCache = null, withdrawCache = {}, activityCache = [];
    const defaultCourses = [
        { id:1, title:"ওয়েব ডেভেলপমেন্ট", icon:"💻", description:"HTML, CSS, JS, React", duration:"৪ মাস", price:2999, active:true, enrolled:45 },
        { id:2, title:"ডাটা সায়েন্স", icon:"🤖", description:"পাইথন, Pandas, ML", duration:"৫ মাস", price:3999, active:true, enrolled:32 },
        { id:3, title:"ডিজিটাল মার্কেটিং", icon:"📈", description:"SEO, Facebook Ads", duration:"৩ মাস", price:2499, active:true, enrolled:28 },
        { id:4, title:"গ্রাফিক ডিজাইন", icon:"🎨", description:"Photoshop, Illustrator", duration:"৩ মাস", price:2499, active:true, enrolled:35 },
        { id:5, title:"মোবাইল অ্যাপ ডেভ", icon:"📱", description:"React Native, Firebase", duration:"৪ মাস", price:3299, active:true, enrolled:22 },
        { id:6, title:"সাইবার সিকিউরিটি", icon:"🔒", description:"নেটওয়ার্ক সিকিউরিটি", duration:"৩.৫ মাস", price:3499, active:true, enrolled:18 }
    ];
    const defaultSettings = { siteTitle:"লার্নহাব", heroTitle:"শিখুন, উন্নত হোন", heroSubtitle:"প্রিমিয়াম অনলাইন লার্নিং প্ল্যাটফর্ম | ৬টি কোর্স | লাইভ সাপোর্ট", footerText:"© 2024 লার্নহাব", maintenanceMode:false, activationFee:500, referralBonus:200, minWithdraw:100, siteLogo:"https://raw.githubusercontent.com/teamsilentesports/.gg/main/20260430_225451.png" };
    
    async function loadFromCloud() {
        if(!useGoogleSheets) return;
        let [usersRes, coursesRes, settingsRes, withdrawRes, activityRes] = await Promise.all([
            callSheets("GET_USERS"), callSheets("GET_COURSES"), callSheets("GET_SETTINGS"),
            callSheets("GET_WITHDRAW"), callSheets("GET_ACTIVITY")
        ]);
        if(usersRes && Array.isArray(usersRes)) usersCache = usersRes;
        if(coursesRes && Array.isArray(coursesRes)) coursesCache = coursesRes;
        if(settingsRes && settingsRes.length) settingsCache = settingsRes[0];
        if(withdrawRes && Array.isArray(withdrawRes)) { withdrawCache = {}; for(let w of withdrawRes) { if(!withdrawCache[w.email]) withdrawCache[w.email]=[]; withdrawCache[w.email].push(w); } }
        if(activityRes && Array.isArray(activityRes)) activityCache = activityRes;
        if(!usersCache.length) createDefaultAdmin();
        if(!coursesCache.length) coursesCache = [...defaultCourses];
        if(!settingsCache) settingsCache = {...defaultSettings};
        localStorage.setItem("lms_users", JSON.stringify(usersCache));
        localStorage.setItem("lms_courses", JSON.stringify(coursesCache));
        localStorage.setItem("lms_settings", JSON.stringify(settingsCache));
        localStorage.setItem("lms_withdraw", JSON.stringify(withdrawCache));
        localStorage.setItem("lms_activity", JSON.stringify(activityCache));
    }
    async function syncAll() {
        if(!useGoogleSheets) return;
        await callSheets("SAVE_USERS", usersCache);
        await callSheets("SAVE_COURSES", coursesCache);
        await callSheets("SAVE_SETTINGS", [settingsCache]);
        await callSheets("SAVE_WITHDRAW", Object.values(withdrawCache).flat());
        await callSheets("SAVE_ACTIVITY", activityCache);
    }
    function createDefaultAdmin() {
        if(!usersCache.find(u=>u.email==="admin@learnhub.com")){
            usersCache.push({ id:"1", email:"admin@learnhub.com", password:btoa("admin123"), fullName:"Super Admin", role:"admin", isActive:true, isBlocked:false, wallet:5000, profilePic:null, myReferCode:"ADMIN123", referredUsers:[], enrolledCourses:[], createdAt:new Date().toISOString() });
        }
    }
    // মৌলিক ফাংশন
    function getUsers() { return usersCache; }
    function saveUsers(u) { usersCache = u; localStorage.setItem("lms_users", JSON.stringify(usersCache)); syncAll(); }
    function getCourses() { return coursesCache; }
    function saveCourses(c) { coursesCache = c; localStorage.setItem("lms_courses", JSON.stringify(coursesCache)); syncAll(); }
    function getSettings() { return settingsCache || defaultSettings; }
    function saveSettings(s) { settingsCache = s; localStorage.setItem("lms_settings", JSON.stringify(settingsCache)); syncAll(); }
    function getWithdrawHistory(email) { return withdrawCache[email] || []; }
    function addWithdrawHistory(email, amt) { if(!withdrawCache[email]) withdrawCache[email]=[]; withdrawCache[email].unshift({ email, amount:amt, date:new Date().toISOString(), status:"pending" }); localStorage.setItem("lms_withdraw", JSON.stringify(withdrawCache)); syncAll(); }
    function addActivityLog(action, userEmail, details) { activityCache.unshift({ action, userEmail, details, date:new Date().toISOString() }); if(activityCache.length>200) activityCache.pop(); localStorage.setItem("lms_activity", JSON.stringify(activityCache)); syncAll(); }
    function getCurrentUser() { let em = localStorage.getItem("lms_current"); return em ? usersCache.find(u=>u.email===em) : null; }
    function loginUser(email, pass) { let u = usersCache.find(u=>u.email===email); if(!u) return { success:false, message:"ইমেইল পাওয়া যায়নি" }; if(atob(u.password)!==pass) return { success:false, message:"পাসওয়ার্ড ভুল" }; if(u.isBlocked) return { success:false, message:"একাউন্ট ব্লক" }; localStorage.setItem("lms_current", email); addActivityLog("LOGIN", email, "সফল লগইন"); return { success:true, user:u }; }
    function registerUser(email, pass, name, ref=null) { if(usersCache.find(u=>u.email===email)) return { success:false, message:"ইমেইল exists" }; if(pass.length<6) return { success:false, message:"পাসওয়ার্ড ৬+ অক্ষর" }; let newUser = { id:Date.now().toString(), email, password:btoa(pass), fullName:name, role:"user", isActive:false, isBlocked:false, wallet:0, profilePic:null, myReferCode:"REF"+Math.random().toString(36).substring(2,8).toUpperCase(), referredUsers:[], enrolledCourses:[], createdAt:new Date().toISOString() }; usersCache.push(newUser); saveUsers(usersCache); if(ref) { let refUser = usersCache.find(u=>u.myReferCode===ref); if(refUser) { refUser.wallet += 200; refUser.referredUsers.push(email); saveUsers(usersCache); } } addActivityLog("REGISTER", email, name); return { success:true, user:newUser }; }
    function logout() { localStorage.removeItem("lms_current"); render(); }
    function showToast(msg) { let t=document.createElement("div"); t.className="toast"; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    function updateProfilePic(user, picData) { user.profilePic=picData; saveUsers(usersCache); render(); }
    function enrollCourse(user, courseId) { if(!user.isActive) { showToast("একাউন্ট এক্টিভেট করুন!"); return; } if(!user.enrolledCourses.includes(courseId)) { user.enrolledCourses.push(courseId); let cr = coursesCache.find(c=>c.id==courseId); if(cr) cr.enrolled = (cr.enrolled||0)+1; saveCourses(coursesCache); saveUsers(usersCache); addActivityLog("ENROLL", user.email, `কোর্স ${cr?.title}`); showToast("এনরোল সফল!"); render(); } }
    function activateAccount(user) { let fee=getSettings().activationFee; if(user.isActive) { showToast("ইতিমধ্যে এক্টিভ"); return; } if(user.wallet<fee) { showToast(`পর্যাপ্ত ব্যালেন্স নেই! প্রয়োজন ${fee} টাকা`); return; } if(confirm(`${fee} টাকা দিয়ে একাউন্ট এক্টিভ করবেন?`)) { user.wallet-=fee; user.isActive=true; saveUsers(usersCache); addActivityLog("ACTIVATE", user.email, "একাউন্ট এক্টিভেটেড"); showToast("একাউন্ট এক্টিভেটেড!"); render(); } }
    function requestWithdraw(user, amount) { let min=getSettings().minWithdraw; if(amount<min) { showToast(`ন্যূনতম ${min} টাকা`); return; } if(user.wallet<amount) { showToast("পর্যাপ্ত ব্যালেন্স নাই"); return; } if(confirm(`${amount} টাকা উইথড্র অনুরোধ করবেন?`)) { user.wallet-=amount; addWithdrawHistory(user.email, amount); saveUsers(usersCache); addActivityLog("WITHDRAW_REQ", user.email, amount); showToast("উইথড্র অনুরোধ জমা হয়েছে"); render(); } }
    // অ্যাডমিন ফাংশন
    function adminCredit(email, amt) { let u=usersCache.find(u=>u.email===email); if(u && amt>0) { u.wallet+=amt; saveUsers(usersCache); addActivityLog("ADMIN_CREDIT", email, amt); showToast(`${email} - ${amt} টাকা ক্রেডিট`); render(); } }
    function adminDebit(email, amt) { let u=usersCache.find(u=>u.email===email); if(u && u.wallet>=amt && amt>0) { u.wallet-=amt; saveUsers(usersCache); addActivityLog("ADMIN_DEBIT", email, amt); showToast(`${email} - ${amt} টাকা ডেবিট`); render(); } }
    function toggleBlock(email) { let u=usersCache.find(u=>u.email===email); if(u && u.role!=='admin') { u.isBlocked=!u.isBlocked; saveUsers(usersCache); addActivityLog(u.isBlocked?"BLOCK":"UNBLOCK", email, ""); showToast(`${email} ${u.isBlocked?'ব্লকেড':'আনব্লকেড'}`); render(); } }
    function updateRole(email, role) { let u=usersCache.find(u=>u.email===email); if(u && u.role!=='admin') { u.role=role; saveUsers(usersCache); addActivityLog("ROLE_CHANGE", email, role); showToast(`${email} রোল ${role} করা হয়েছে`); render(); } }
    function addCourse(title,price) { if(!title) return; let newId=Math.max(...coursesCache.map(c=>c.id),0)+1; coursesCache.push({ id:newId, title, icon:"📚", description:"নতুন কোর্স", duration:"৩ মাস", price:price||1999, active:true, enrolled:0 }); saveCourses(coursesCache); addActivityLog("ADD_COURSE","admin",title); showToast("কোর্স যোগ হয়েছে"); render(); }
    function toggleCourse(id) { let c=coursesCache.find(c=>c.id==id); if(c) { c.active=!c.active; saveCourses(coursesCache); addActivityLog("TOGGLE_COURSE","admin",c.title); showToast(`কোর্স ${c.active?'সক্রিয়':'নিষ্ক্রিয়'}`); render(); } }
    function deleteCourse(id) { if(confirm("ডিলিট করবেন?")) { coursesCache=coursesCache.filter(c=>c.id!=id); saveCourses(coursesCache); addActivityLog("DEL_COURSE","admin",""); showToast("ডিলিট করা হয়েছে"); render(); } }
    function saveSiteSettings() { let s=getSettings(); s.siteTitle=document.getElementById("siteTitle")?.value; s.heroTitle=document.getElementById("heroTitle")?.value; s.heroSubtitle=document.getElementById("heroSubtitle")?.value; s.footerText=document.getElementById("footerText")?.value; s.maintenanceMode=document.getElementById("maintenanceMode")?.checked; s.activationFee=parseInt(document.getElementById("activationFee")?.value); s.referralBonus=parseInt(document.getElementById("referralBonus")?.value); s.minWithdraw=parseInt(document.getElementById("minWithdraw")?.value); saveSettings(s); showToast("সেটিংস সেভ!"); render(); }
    function updateSiteLogo(input) { if(input.files && input.files[0]) { let r=new FileReader(); r.onload=e=>{ let s=getSettings(); s.siteLogo=e.target.result; saveSettings(s); document.getElementById("siteLogo").src=e.target.result; showToast("লোগো আপডেট"); render(); }; r.readAsDataURL(input.files[0]); } }
    function createBackup() { let backup={ users:usersCache, courses:coursesCache, settings:settingsCache, date:new Date() }; let a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(backup,null,2)],{type:"application/json"})); a.download=`learnhub_backup_${Date.now()}.json`; a.click(); showToast("ব্যাকআপ ডাউনলোড"); }
    // UI রেন্ডারিং (সংক্ষেপে)
    let currentUser=null, currentView="home", adminView="dashboard", slideIndex=0;
    const slides=[{icon:"🎯",title:"প্র্যাকটিক্যাল লার্নিং",desc:"রিয়েল প্রজেক্ট ভিত্তিক শিক্ষা"},{icon:"👨‍🏫",title:"এক্সপার্ট মেন্টর",desc:"ইন্ডাস্ট্রি এক্সপার্টদের কাছ থেকে"},{icon:"🎓",title:"সার্টিফিকেট",desc:"কোর্স শেষে সার্টিফিকেট"}];
    function initSlider() { if(document.getElementById("sliderWrapper")) setInterval(()=>{ slideIndex=(slideIndex+1)%slides.length; updateSlider(); },3000); }
    function updateSlider() { let w=document.getElementById("sliderWrapper"); let dots=document.querySelectorAll(".dot"); if(w) { w.style.transform=`translateX(-${slideIndex*100}%)`; dots.forEach((d,i)=>i===slideIndex?d.classList.add("active"):d.classList.remove("active")); } }
    function goToSlide(i) { slideIndex=i; updateSlider(); }

    function renderSidebar() { let u=getCurrentUser(); let items=''; if(!u) items=`<button class="sidebar-item" onclick="closeSidebar(); openAuthModal(false)"><i class="fas fa-sign-in-alt sidebar-icon"></i><span>লগইন</span></button><button class="sidebar-item" onclick="closeSidebar(); openAuthModal(true)"><i class="fas fa-user-plus sidebar-icon"></i><span>সাইনআপ</span></button><div class="sidebar-divider"></div><button class="sidebar-item" onclick="closeSidebar(); openAuthModal(false,'admin')"><i class="fas fa-crown sidebar-icon"></i><span>অ্যাডমিন লগইন</span></button><button class="sidebar-item" onclick="closeSidebar(); openAuthModal(false,'subadmin')"><i class="fas fa-user-tie sidebar-icon"></i><span>সাব-অ্যাডমিন লগইন</span></button>`; else if(u.role==="admin") items=`<button class="sidebar-item" onclick="closeSidebar(); adminView='dashboard'; currentView='admin'; render()"><i class="fas fa-chart-line sidebar-icon"></i><span>📊 ড্যাশবোর্ড</span></button><button class="sidebar-item" onclick="closeSidebar(); adminView='settings'; currentView='admin'; render()"><i class="fas fa-globe sidebar-icon"></i><span>🌐 সাইট সেটিংস</span></button><button class="sidebar-item" onclick="closeSidebar(); adminView='courses'; currentView='admin'; render()"><i class="fas fa-book sidebar-icon"></i><span>📚 কোর্স ম্যানেজ</span></button><button class="sidebar-item" onclick="closeSidebar(); adminView='users'; currentView='admin'; render()"><i class="fas fa-users sidebar-icon"></i><span>👥 ইউজার ম্যানেজ</span></button><button class="sidebar-item" onclick="closeSidebar(); adminView='leaderboard'; currentView='admin'; render()"><i class="fas fa-trophy sidebar-icon"></i><span>🏆 লিডারবোর্ড</span></button><button class="sidebar-item" onclick="closeSidebar(); adminView='reports'; currentView='admin'; render()"><i class="fas fa-chart-bar sidebar-icon"></i><span>📊 রিপোর্ট</span></button><button class="sidebar-item" onclick="closeSidebar(); adminView='activity'; currentView='admin'; render()"><i class="fas fa-history sidebar-icon"></i><span>📝 অ্যাক্টিভিটি লগ</span></button><button class="sidebar-item" onclick="closeSidebar(); adminView='backup'; currentView='admin'; render()"><i class="fas fa-database sidebar-icon"></i><span>💾 ব্যাকআপ</span></button><div class="sidebar-divider"></div><button class="sidebar-item" onclick="closeSidebar(); currentView='profile'; render()"><i class="fas fa-user sidebar-icon"></i><span>👤 প্রোফাইল</span></button><button class="sidebar-item" onclick="closeSidebar(); currentView='courses'; render()"><i class="fas fa-book sidebar-icon"></i><span>📚 কোর্স</span></button><button class="sidebar-item" onclick="closeSidebar(); currentView='referral'; render()"><i class="fas fa-link sidebar-icon"></i><span>🔗 রেফারেল</span></button><button class="sidebar-item" onclick="closeSidebar(); currentView='withdraw'; render()"><i class="fas fa-hand-holding-usd sidebar-icon"></i><span>💰 উইথড্র</span></button><button class="sidebar-item" onclick="closeSidebar(); currentView='withdraw-history'; render()"><i class="fas fa-history sidebar-icon"></i><span>📜 ইতিহাস</span></button><div class="sidebar-divider"></div><button class="sidebar-item" onclick="closeSidebar(); logout()"><i class="fas fa-sign-out-alt sidebar-icon"></i><span>🚪 লগআউট</span></button>`; else items=`<button class="sidebar-item" onclick="closeSidebar(); currentView='profile'; render()"><i class="fas fa-user sidebar-icon"></i><span>👤 প্রোফাইল</span></button><button class="sidebar-item" onclick="closeSidebar(); currentView='courses'; render()"><i class="fas fa-book sidebar-icon"></i><span>📚 কোর্স</span></button><button class="sidebar-item" onclick="closeSidebar(); currentView='referral'; render()"><i class="fas fa-link sidebar-icon"></i><span>🔗 রেফারেল</span></button><button class="sidebar-item" onclick="closeSidebar(); currentView='withdraw'; render()"><i class="fas fa-hand-holding-usd sidebar-icon"></i><span>💰 উইথড্র</span></button><button class="sidebar-item" onclick="closeSidebar(); currentView='withdraw-history'; render()"><i class="fas fa-history sidebar-icon"></i><span>📜 ইতিহাস</span></button><div class="sidebar-divider"></div><button class="sidebar-item" onclick="closeSidebar(); logout()"><i class="fas fa-sign-out-alt sidebar-icon"></i><span>🚪 লগআউট</span></button>`; return `<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div><div class="sidebar" id="sidebar"><button class="close-sidebar" onclick="closeSidebar()"><i class="fas fa-times"></i></button>${items}</div>`;
    }
    function renderFooter() { let s=getSettings(); return `<footer class="footer"><p>${s.footerText}</p></footer>`; }
    function render() { let u=getCurrentUser(); let app=document.getElementById("app"); let badge=document.getElementById("userBadge"); let logo=document.getElementById("siteLogo"); let s=getSettings(); if(logo) logo.src=s.siteLogo; if(u&&badge) { badge.style.display="flex"; badge.innerHTML=`<i class="fas fa-user-check"></i> ${u.fullName.split(" ")[0]}${u.role==='admin'?' (এডমিন)':''}`; } else if(badge) badge.style.display="none"; app.innerHTML=`${renderSidebar()}<div>${renderDashboard()}</div>${renderFooter()}`; let btn=document.getElementById("doWithdrawBtn"); if(btn) btn.onclick=()=>{ let amt=parseInt(document.getElementById("withdrawAmount")?.value); let uu=getCurrentUser(); if(requestWithdraw(uu,amt)) { document.getElementById("withdrawAmount").value=""; currentView="withdraw-history"; render(); } }; }
    let isLoginMode=true;
    function openAuthModal(isSignup=false, expectedRole="user") { isLoginMode=!isSignup; let modalHtml=`<div class="modal" id="authModal"><div class="modal-content"><span class="close-modal" onclick="closeModal()">&times;</span><div id="authFormContainer"></div></div></div>`; document.body.insertAdjacentHTML("beforeend",modalHtml); document.getElementById("authModal").classList.add("open"); updateAuthForm(expectedRole); }
    function updateAuthForm(expectedRole) { let c=document.getElementById("authFormContainer"); if(!c) return; if(isLoginMode) { c.innerHTML=`<h2>${expectedRole==='admin'?'👑 অ্যাডমিন লগইন':(expectedRole==='subadmin'?'🌟 সাব-অ্যাডমিন লগইন':'🔐 লগইন')}</h2><input type="email" id="loginEmail" placeholder="ইমেইล"><input type="password" id="loginPassword" placeholder="পাসওয়ার্ড"><button class="btn btn-primary" onclick="submitLogin('${expectedRole}')">লগইন</button>${expectedRole!=='admin'&&expectedRole!=='subadmin'?`<div class="switch-link" onclick="toggleAuthMode()">✨ নতুন ব্যবহারকারী? সাইনআপ করুন</div>`:''}<div id="authError" style="color:red;margin-top:10px;"></div>`; } else { c.innerHTML=`<h2>📝 সাইনআপ</h2><input type="text" id="signupName" placeholder="পূর্ণ নাম"><input type="email" id="signupEmail" placeholder="ইমেইল"><input type="password" id="signupPassword" placeholder="পাসওয়ার্ড (6+)"><input type="text" id="signupRef" placeholder="রেফারেল কোড"><button class="btn btn-primary" onclick="submitSignup()">সাইনআপ</button><div class="switch-link" onclick="toggleAuthMode()">🔑 ইতিমধ্যে একাউন্ট আছে? লগইন করুন</div><div id="authError" style="color:red;margin-top:10px;"></div>`; } }
    function toggleAuthMode() { isLoginMode=!isLoginMode; updateAuthForm(); }
    function closeModal() { document.getElementById("authModal")?.remove(); }
    window.submitLogin=(role)=>{ let email=document.getElementById("loginEmail").value; let pass=document.getElementById("loginPassword").value; let res=loginUser(email,pass); if(res.success){ if((role==='admin'||role==='subadmin')&&res.user.role!==role&&res.user.role!=='admin') { document.getElementById("authError").innerText="এই একাউন্ট অ্যাডমিন নয়!"; return; } closeModal(); render(); } else document.getElementById("authError").innerText=res.message; };
    window.submitSignup=()=>{ let name=document.getElementById("signupName").value; let email=document.getElementById("signupEmail").value; let pass=document.getElementById("signupPassword").value; let ref=document.getElementById("signupRef").value; if(!name||!email||!pass) { document.getElementById("authError").innerText="সব তথ্য দিন"; return; } if(pass.length<6) { document.getElementById("authError").innerText="পাসওয়ার্ড ৬+ অক্ষর"; return; } let res=registerUser(email,pass,name,ref); if(res.success) { closeModal(); showToast("সাইনআপ সফল! লগইন করুন"); } else document.getElementById("authError").innerText=res.message; };
    function openSidebar() { document.getElementById("sidebar")?.classList.add("open"); document.getElementById("sidebarOverlay")?.classList.add("open"); }
    function closeSidebar() { document.getElementById("sidebar")?.classList.remove("open"); document.getElementById("sidebarOverlay")?.classList.remove("open"); }
    window.openSidebar=openSidebar; window.closeSidebar=closeSidebar; window.openAuthModal=openAuthModal; window.closeModal=closeModal; window.render=render; window.logout=logout; window.activateAccount=activateAccount; window.enrollCourse=enrollCourse; window.copyRefLink=()=>{ let i=document.getElementById("refLink"); if(i){ i.select(); document.execCommand("copy"); showToast("কপি!"); } }; window.getCurrentUser=getCurrentUser; window.updateSiteLogo=updateSiteLogo; window.saveSiteSettings=saveSiteSettings; window.adminCredit=adminCredit; window.adminDebit=adminDebit; window.toggleBlock=toggleBlock; window.updateRole=updateRole; window.addCourse=addCourse; window.toggleCourse=toggleCourse; window.deleteCourse=deleteCourse; window.createBackup=createBackup; window.syncAll=syncAll; window.goToSlide=goToSlide; window.uploadProfilePic=(input)=>{ if(input.files&&input.files[0]){ let r=new FileReader(); r.onload=e=>updateProfilePic(getCurrentUser(),e.target.result); r.readAsDataURL(input.files[0]); } };
    document.getElementById("menuBtn")?.addEventListener("click",openSidebar); document.getElementById("accountBtn")?.addEventListener("click",()=>{ if(getCurrentUser()){ currentView="profile"; render(); closeSidebar(); } else openAuthModal(); }); document.getElementById("homeLogo")?.addEventListener("click",()=>{ currentView="home"; render(); }); document.getElementById("themeBtn")?.addEventListener("click",()=>document.body.classList.toggle("light-mode"));
    (async()=>{ await loadFromCloud(); createDefaultAdmin(); render(); })();
</script>
